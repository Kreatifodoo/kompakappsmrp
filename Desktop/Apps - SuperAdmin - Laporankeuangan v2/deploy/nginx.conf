# /etc/nginx/sites-available/kompakapp
# Symlink ke /etc/nginx/sites-enabled/kompakapp
#
# Arsitektur:
#   :80   → redirect ke HTTPS
#   :443  → SSL termination
#          /api/v1/*  → FastAPI backend (port 8000)
#          /*         → SPA frontend via serve.py (port 8080)

server {
    listen 80;
    server_name accounting.kompakapps.com;

    # Certbot / Let's Encrypt HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name accounting.kompakapps.com;

    # ── SSL (diisi oleh certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/accounting.kompakapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/accounting.kompakapps.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/kompakapp.access.log;
    error_log  /var/log/nginx/kompakapp.error.log;

    # ── FastAPI (new backend) ────────────────────────────────
    # Semua request ke /api/v1/ dan /docs /openapi.json
    location ~ ^/(api/v1|docs|openapi\.json|redoc)(/|$) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # Health check endpoint (FastAPI)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # ── Legacy SPA + old Python API ──────────────────────────
    # /api/ (lama: /api/data, /api/ping, dll.) → serve.py
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static files + SPA fallback → serve.py
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Cache static assets
        location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
            proxy_pass http://127.0.0.1:8080;
            expires    7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
