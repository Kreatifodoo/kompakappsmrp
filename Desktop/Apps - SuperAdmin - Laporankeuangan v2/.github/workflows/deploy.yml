name: Deploy to Linode

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            APPDIR="/opt/kompakapp/Desktop/Apps - SuperAdmin - Laporankeuangan v2"
            git -C "$APPDIR" pull origin main
            cd "$APPDIR"
            python3 build.py
            pkill -f "python.*serve.py" || true
            sleep 2
            nohup python3 app/serve.py > /tmp/kompakapp.log 2>&1 &
            sleep 1
            echo "✅ Deployment selesai! Aplikasi running di https://accounting.kompakapps.com"
