name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  # Test DB credentials match the postgres service container below
  TEST_DB_URL: postgresql+asyncpg://kompak:kompak_dev@localhost:5432/kompak_test
  # Required by Pydantic Settings — value doesn't matter for CI, just length
  JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-OK
  # alembic upgrade smoke uses the same DB
  DB_PRIMARY_URL: postgresql+asyncpg://kompak:kompak_dev@localhost:5432/kompak_test

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format --check
        run: ruff format --check app tests

  test:
    name: Tests + Alembic smoke
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kompak
          POSTGRES_PASSWORD: kompak_dev
          POSTGRES_DB: kompak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kompak -d kompak_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev deps)
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U kompak -d kompak_test && break
            sleep 1
          done

      - name: Install citext extension
        env:
          PGPASSWORD: kompak_dev
        run: |
          psql -h localhost -U kompak -d kompak_test \
            -c "CREATE EXTENSION IF NOT EXISTS citext;"

      - name: Alembic upgrade head (migration smoke check)
        run: alembic upgrade head

      - name: Alembic downgrade base then upgrade head (round-trip)
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Run pytest
        run: pytest -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore
          retention-days: 14
